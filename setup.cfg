[tool:pytest]
testpaths = prisma_agents/tests

[pytest]
asyncio_mode = auto
pythonpath = prisma_agents

[coverage:run]
source = prisma_agents
omit =
    prisma_agents/dashboard.py
    prisma_agents/run.py
    prisma_agents/api/server.py
    prisma_agents/eval/*
    prisma_agents/tests/*
    prisma_agents/venv/*
    prisma_agents/token_reports/*

[coverage:report]
exclude_lines =
    pragma: no cover
    if __name__ == .__main__.:
    raise NotImplementedError
show_missing = true
fail_under = 90
